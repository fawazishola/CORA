<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORA NPU - Token Simulator</title>
<style>
    body {
        margin: 0;
        padding: 40px;
        background-color: #050505;
        color: #00ffcc;
        font-family: 'Courier New', Courier, monospace;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
    }
    h1 {
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 1px solid #333;
        padding-bottom: 20px;
    }
    .controls {
        margin: 30px 0;
        padding: 20px;
        border: 1px solid #1a1a1a;
        background: #0a0a0a;
    }
    .slider-container {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
    }
    input[type=range] {
        flex-grow: 1;
        accent-color: #00ffcc;
    }
    .input-group {
        display: flex;
        gap: 10px;
    }
    input[type=text] {
        flex-grow: 1;
        background: transparent;
        color: #fff;
        border: 1px solid #333;
        padding: 10px;
        font-family: monospace;
        font-size: 1rem;
    }
    input[type=text]:focus {
        outline: none;
        border-color: #00ffcc;
    }
    button {
        background: #00ffcc;
        color: #000;
        border: none;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    button:hover {
        background: #00ccaa;
    }
    .terminal {
        margin-top: 30px;
        min-height: 400px;
        padding: 20px;
        background: #0a0a0a;
        border: 1px dashed #333;
        font-size: 1.1rem;
        line-height: 1.6;
        white-space: pre-wrap;
    }
    .cursor::after {
        content: '_';
        animation: blink 1s step-end infinite;
    }
    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>CORA NPU - Physical Inferencing Simulation</h1>
    
    <div class="controls">
        <div class="slider-container">
            <label>Hardware Target:</label>
            <input type="range" id="speedSlider" min="1" max="100" value="8">
            <span style="font-weight: bold;"><span id="speedDisplay">8</span> t/s</span>
        </div>
        
        <div class="input-group">
            <input type="text" id="promptInput" value="What is neurosymbolic AI?">
            <button onclick="simulateInference()">Execute</button>
        </div>
    </div>

    <div class="terminal" id="terminalOutput"><span class="cursor"></span></div>
</div>

<script>
    const answer = "Neurosymbolic AI is a hybrid architecture computationally merging two distinct paradigms: Neural Networks (for probabilistic pattern recognition and generative heuristic search) and Symbolic AI (for deterministic, mathematically rigorous logic verification).\n\nIn the Axiom stack, the generative language model handles the creative permutation of physical proofs, while the Tenet engine acts as the symbolic filter. When compiled down to physical space on the CORA NPU, the symbolic logic is hardwired directly into the Artix-7 FPGA fabric.\n\nBecause truth is enforced at the physical gate level, hardware-level hallucinations are mathematically impossible. This guarantees 100% adherence to axiomatic systems in real-time edge processing.";

    // A token is roughly 4 characters in English. 
    // We split the long answer into pseudo-tokens.
    const tokens = answer.match(/.{1,4}/g) || [];
    let intervalId = null;

    const slider = document.getElementById('speedSlider');
    const display = document.getElementById('speedDisplay');
    const terminal = document.getElementById('terminalOutput');

    // Update slider visually
    slider.addEventListener('input', (e) => {
        display.innerText = e.target.value;
        const currentSpeed = e.target.value;
        if(currentSpeed == 8) {
            display.innerText += " (Zynq Custom PCB Target)";
        } else if (currentSpeed > 40) {
            display.innerText += " (Cloud A100 GPU Target)";
        }
    });
    
    // Set initial custom text for 8 t/s
    display.innerText = "8 (Zynq Custom PCB Target)";

    function simulateInference() {
        // Clear any running simulation
        if(intervalId) clearInterval(intervalId);

        const prompt = document.getElementById('promptInput').value;
        const speed = parseInt(slider.value); // Tokens per second
        const msPerToken = 1000 / speed; // Milliseconds per token

        terminal.innerHTML = `<span style="color: #666;">> ${prompt}</span>\n\n`;
        
        let currentIndex = 0;
        
        intervalId = setInterval(() => {
            if (currentIndex >= tokens.length) {
                clearInterval(intervalId);
                terminal.innerHTML += '<span class="cursor"></span>'; // Add cursor back
                return;
            }
            
            // Append the next token to the DOM
            terminal.innerHTML = terminal.innerHTML.replace('<span class="cursor"></span>', '');
            terminal.innerHTML += tokens[currentIndex];
            terminal.innerHTML += '<span class="cursor"></span>';
            
            currentIndex++;
        }, msPerToken);
    }
</script>

</body>
</html>
